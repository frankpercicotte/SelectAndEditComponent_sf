<template>
    <lightning-card title="Selecionar e Editar Valores">
        <div class="slds-m-around_medium">
            <lightning-combobox
                label="Escolha um item"
                value={selectedItem}
                options={availableItems}
                onchange={handleItemChange}>
            </lightning-combobox>

            <lightning-input
                type="text"
                label="Valor"
                value={inputValue}
                onchange={handleValueChange}>
            </lightning-input>

            <lightning-button-icon
                icon-name="utility:add"
                alternative-text="Adicionar"
                variant="brand"
                onclick={addItem}>
            </lightning-button-icon>
        </div>

        <template if:true={paginatedItems.length}>
            <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-m-top_medium">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={paginatedItems} for:item="entry">
                        <tr key={entry.id}>
                            <td>{entry.name}</td>
                            <td>{entry.value}</td>
                            <td>
                                <lightning-button-icon icon-name="utility:edit" alternative-text="Editar"
                                    class="slds-m-right_small" onclick={editItem} data-id={entry.id}>
                                </lightning-button-icon>
                                <lightning-button-icon icon-name="utility:delete" alternative-text="Remover"
                                    onclick={removeItem} data-id={entry.id}>
                                </lightning-button-icon>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>

            <!-- Controles de Paginação -->
            <div class="slds-m-top_medium slds-grid slds-align_absolute-center">
                <lightning-button label="Anterior" onclick={previousPage} disabled={disablePrevious}></lightning-button>
                <span class="slds-m-horizontal_small">{currentPage} / {totalPages}</span>
                <lightning-button label="Próximo" onclick={nextPage} disabled={disableNext}></lightning-button>
            </div>
        </template>
    </lightning-card>
</template>
